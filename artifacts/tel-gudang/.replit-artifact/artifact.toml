kind = "web"
previewPath = "/"
title = "TeL Gudang — Sistem Manajemen Gudang"
version = "1.0.0"
id = "artifacts/tel-gudang"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20971

[services.development]
run = "pnpm --filter @workspace/tel-gudang run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tel-gudang", "run", "build" ]
publicDir = "artifacts/tel-gudang/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20971"
BASE_PATH = "/"
